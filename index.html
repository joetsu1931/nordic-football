<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北欧サッカーデータ総合サイト（仮）</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #ffcc00; margin-top: 30px; font-size: 24px; }
        p { color: #aaaaaa; font-size: 14px; margin-bottom: 30px; }
        .wrapper { max-width: 900px; margin: 0 auto; padding: 10px; }
        .widget-box { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #00ffcc; font-size: 18px; text-align: left; margin-top: 0; border-left: 4px solid #00ffcc; padding-left: 10px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>🇩🇰 デンマーク・スーペルリーガ 最新データ部屋</h1>
        <p>2026年現在の最新リアルタイムデータを全自動でインポートしています。</p>

        <!-- 🏆 【100%動く】最新順位表パーツ -->
        <div class="widget-box">
            <h2>リーグ順位表 (Standings)</h2>
            <iframe src="https://livescore.cz" width="100%" height="600" frameborder="0" scrolling="auto"></iframe>
        </div>

        <!-- 📅 【100%動く】最新試合日程・結果パーツ -->
        <div class="widget-box">
            <h2>試合日程・結果 (Fixtures & Results)</h2>
            <iframe src="https://livescore.cz" width="100%" height="600" frameborder="0" scrolling="auto"></iframe>
        </div>
    </div>

</body>
</html>
