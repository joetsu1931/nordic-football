<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北欧サッカーデータ総合サイト（仮）</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; text-align: center; }
        .header { background: #1e1e1e; padding: 20px 10px; border-bottom: 3px solid #ffcc00; }
        h1 { color: #ffcc00; margin: 0 0 5px 0; font-size: 20px; font-weight: bold; }
        p { color: #aaaaaa; margin: 0; font-size: 12px; }
        .tab-menu { display: flex; background: #1e1e1e; border-bottom: 1px solid #2d2d2d; }
        .tab-btn { flex: 1; padding: 15px 0; background: none; color: #888888; border: none; font-size: 14px; font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; background: #252525; }
        .wrapper { width: 100%; max-width: 500px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        .widget-content { display: none; }
        .widget-content.active { display: block; }
        
        /* 📊 本格的なサッカースタッツ表のデザイン */
        table { width: 100%; border-collapse: collapse; background-color: #1e1e1e; border-radius: 8px; overflow: hidden; margin-top: 10px; font-size: 13px; }
        th { background-color: #ffcc00; color: #121212; padding: 10px 5px; font-weight: bold; }
        td { padding: 12px 5px; border-bottom: 1px solid #2d2d2d; text-align: center; }
        .team-name { text-align: left; font-weight: bold; padding-left: 5px; }
        
        /* 📅 試合日程カードのデザイン */
        .game-card { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 10px; text-align: left; border-left: 4px solid #ffcc00; }
        .game-date { font-size: 11px; color: #888888; }
        .game-teams { font-size: 15px; font-weight: bold; margin: 5px 0; }
        .game-score { font-size: 13px; color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🇩🇰 デンマーク・スーペルリーガ</h1>
        <p>2026年最新リアルタイム速報（自社データ運用）</p>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('standings', this)">最新順位表</button>
        <button class="tab-btn" onclick="switchTab('fixtures', this)">試合日程・結果</button>
    </div>

    <div class="wrapper">
        <!-- 🏆 【本格順位表】「（推し）」を排除し、詳細スタッツを追加！ -->
        <div id="standings" class="widget-content active">
            <table>
                <tr>
                    <th style="width: 10%;">順位</th>
                    <th style="width: 45%;">クラブ名</th>
                    <th style="width: 10%;">試合</th>
                    <th style="width: 8%;">勝</th>
                    <th style="width: 8%;">分</th>
                    <th style="width: 8%;">敗</th>
                    <th style="width: 11%;">得失</th>
                    <th style="width: 10%;">勝点</th>
                </tr>
                <tr>
                    <td>1</td>
                    <td class="team-name">FCミッティラン 🔴</td>
                    <td>22</td><td>13</td><td>3</td><td>6</td><td>+15</td><td><b>42</b></td>
                </tr>
                <tr>
                    <td>2</td>
                    <td class="team-name">FCコペンハーゲン ⚪</td>
                    <td>22</td><td>12</td><td>4</td><td>6</td><td>+12</td><td><b>40</b></td>
                </tr>
                <tr>
                    <td>3</td>
                    <td class="team-name">ブレンビーIF 🟡</td>
                    <td>22</td><td>11</td><td>5</td><td>6</td><td>+10</td><td><b>38</b></td>
                </tr>
                <tr>
                    <td>4</td>
                    <td class="team-name">オーフスGF ⚪</td>
                    <td>22</td><td>10</td><td>5</td><td>7</td><td>+5</td><td><b>35</b></td>
                </tr>
            </table>
        </div>

        <!-- 📅 【試合日程・結果】 -->
        <div id="fixtures" class="widget-content">
            <div class="game-card">
                <div class="game-date">2026年7月5日 21:00 (日本時間)</div>
                <div class="game-teams">🏠 FCミッティラン vs 🚌 ブレンビーIF</div>
                <div class="game-score">結果：2 - 1 【試合終了】</div>
            </div>
            
            <div class="game-card">
                <div class="game-date">2026年7月12日 23:30 (日本時間)</div>
                <div class="game-teams">🏠 FCコペンハーゲン vs 🚌 FCミッティラン</div>
                <div class="game-score">結果：-- vs -- 【試合前】</div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabId, button) {
            var contents = document.getElementsByClassName('widget-content');
            for (var i = 0; i < contents.length; i++) { contents[i].classList.remove('active'); }
            var buttons = document.getElementsByClassName('tab-btn');
            for (var i = 0; i < buttons.length; i++) { buttons[i].classList.remove('active'); }
            document.getElementById(tabId).classList.add('active');
            button.classList.add('active');
        }
    </script>

</body>
</html>
