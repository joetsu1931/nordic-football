<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北欧サッカーデータ総合サイト（仮）</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        .header { background: #1e1e1e; padding: 20px 10px; border-bottom: 3px solid #ffcc00; }
        h1 { color: #ffcc00; margin: 0 0 5px 0; font-size: 20px; }
        p { color: #aaaaaa; margin: 0; font-size: 12px; }
        .tab-menu { display: flex; background: #1e1e1e; border-bottom: 1px solid #2d2d2d; }
        .tab-btn { flex: 1; padding: 15px 0; background: none; color: #888888; border: none; font-size: 14px; font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; background: #252525; }
        .wrapper { width: 100%; max-width: 500px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        .widget-content { display: none; }
        .widget-content.active { display: block; }
        
        /* 📊 超見やすい脳筋テーブル（表）のデザイン */
        table { width: 100%; border-collapse: collapse; background-color: #1e1e1e; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        th { background-color: #ffcc00; color: #121212; padding: 12px; font-weight: bold; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #2d2d2d; font-size: 14px; text-align: center; }
        .game-card { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 10px; text-align: left; border-left: 4px solid #ffcc00; }
        .game-date { font-size: 12px; color: #888888; }
        .game-teams { font-size: 15px; font-weight: bold; margin: 5px 0; }
        .game-score { font-size: 14px; color: #ffcc00; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🇩🇰 デンマーク・スーペルリーガ</h1>
        <p>2026年最新リアルタイム速報（自社データ運用）</p>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('standings', this)">最新順位表</button>
        <button class="tab-btn" onclick="switchTab('fixtures', this)">試合日程・結果</button>
    </div>

    <div class="wrapper">
        <!-- 🏆 【最新順位表】ここをあなたが書き換えるだけでサイトが即更新されます！ -->
        <div id="standings" class="widget-content active">
            <table>
                <tr>
                    <th>順位</th>
                    <th>クラブ名</th>
                    <th>勝点</th>
                </tr>
                <tr>
                    <td>1</td>
                    <td>FCミッティラン 🔴 (推し)</td>
                    <td>42</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>FCコペンハーゲン ⚪</td>
                    <td>40</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>ブレンビーIF 🟡</td>
                    <td>38</td>
                </tr>
                <tr>
                    <td>4</td>
                    <td>オーフスGF ⚪</td>
                    <td>35</td>
                </tr>
            </table>
        </div>

        <!-- 📅 【試合日程・結果】ここも文字を変えるだけで100%日本語で反映！ -->
        <div id="fixtures" class="widget-content">
            <div class="game-card">
                <div class="game-date">2026年7月5日 21:00 (日本時間)</div>
                <div class="game-teams">🏠 FCミッティラン vs 🚌 ブレンビーIF</div>
                <div class="game-score">結果：2 - 1 【試合終了】</div>
            </div>
            
            <div class="game-card">
                <div class="game-date">2026年7月12日 23:30 (日本時間)</div>
                <div class="game-teams">🏠 FCコペンハーゲン vs 🚌 FCミッティラン</div>
                <div class="game-score">結果：-- vs -- 【試合前】</div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabId, button) {
            var contents = document.getElementsByClassName('widget-content');
            for (var i = 0; i < contents.length; i++) { contents[i].classList.remove('active'); }
            var buttons = document.getElementsByClassName('tab-btn');
            for (var i = 0; i < buttons.length; i++) { buttons[i].classList.remove('active'); }
            document.getElementById(tabId).classList.add('active');
            button.classList.add('active');
        }
    </script>

</body>
</html>
